name: ci

# Quality gate: every PR and every push to main must type-check and build.
# Pair this with a branch-protection rule requiring the "build" check so that
# broken code cannot be merged (or auto-deployed) to production.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run build
