name: keep-render-warm

# Render free instances spin down after ~15 min idle, causing a ~50s cold start
# on the next request (during which the backend may fall back to degraded stats).
# Ping /health every ~13 min to keep the statistics service warm.
# Offset off the :00/:10 boundaries to reduce GitHub's scheduled-run delay.

on:
  schedule:
    - cron: '4,17,30,43,56 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping stats service health
        run: |
          URL="https://art-thesis-stats.onrender.com/health"
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -m 70 "$URL") || code="000"
            if [ "$code" = "200" ]; then
              echo "warm (HTTP $code)"
              exit 0
            fi
            echo "attempt $i: HTTP $code, retrying..."
            sleep 15
          done
          # Do not fail the workflow on a transient miss; the next run will retry.
          echo "service not warm after retries (HTTP $code)"
          exit 0
